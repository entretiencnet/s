<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signer votre contrat — Entretien C-Net</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;background:#f0f4ee;min-height:100vh}
.header{background:#1e4d1a;padding:20px 24px;display:flex;align-items:center;gap:14px}
.logo{width:44px;height:44px;background:white;border-radius:12px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.logo img{width:38px;height:38px;object-fit:contain}
.header h1{font-size:18px;font-weight:800;color:white}
.header p{font-size:11px;color:rgba(255,255,255,0.55);margin-top:2px}
.wrap{max-width:640px;margin:0 auto;padding:24px 16px 48px}
.etapes{display:flex;margin-bottom:24px}
.etape{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;position:relative}
.etape::after{content:"";position:absolute;top:14px;left:60%;width:80%;height:2px;background:#dde8d9;z-index:0}
.etape:last-child::after{display:none}
.ecer{width:28px;height:28px;border-radius:50%;background:#dde8d9;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#7a9e74;z-index:1}
.etape.active .ecer{background:#1e4d1a;color:white}
.etape.done .ecer{background:#c8a84b;color:white}
.elbl{font-size:10px;color:#7a9e74;font-weight:600;text-align:center}
.etape.active .elbl{color:#1e4d1a;font-weight:700}
.card{background:white;border-radius:18px;padding:22px 20px;box-shadow:0 2px 14px rgba(0,0,0,0.06);margin-bottom:14px}
.card-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#1e4d1a;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.card-title::before{content:"";display:block;width:3px;height:14px;background:#c8a84b;border-radius:2px}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.info-box{background:#f5faf4;border-radius:12px;padding:12px 14px}
.info-box.full{grid-column:1/-1}
.info-lbl{font-size:10px;font-weight:700;color:#7a9e74;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.info-val{font-size:13px;font-weight:600;color:#1a3317}
.info-val.grand{font-size:18px;font-weight:800;color:#1e4d1a}
.svc-item{display:flex;align-items:center;gap:8px;font-size:13px;color:#1a3317;padding:6px 10px;background:#f5faf4;border-radius:8px;margin-bottom:5px}
.svc-item::before{content:"✓";color:#1e4d1a;font-weight:700;font-size:12px}
.sig-zone{border:2px dashed #b0d4a8;border-radius:14px;overflow:hidden;position:relative;background:#fafffe;transition:border-color .2s}
.sig-zone.drawing{border-color:#1e4d1a;border-style:solid}
.sig-lbl{text-align:center;padding:10px;font-size:11px;color:#b0c8aa;font-weight:600;text-transform:uppercase;letter-spacing:.06em}
canvas{display:block;width:100%;height:160px;cursor:crosshair;touch-action:none}
.loi25-box{background:#fffbeb;border:1.5px solid #fbbf24;border-radius:14px;padding:16px 18px;margin-bottom:14px}
.loi25-box h3{font-size:13px;font-weight:700;color:#92400e;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.loi25-box p{font-size:11.5px;color:#78350f;line-height:1.6;margin-bottom:8px}
.loi25-box .cb-row{margin-top:10px}
.alt-confirm-box{background:#f0fdf4;border:1.5px solid #86efac;border-radius:14px;padding:18px;margin-top:14px}
.alt-confirm-box h3{font-size:13px;font-weight:700;color:#166534;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.alt-confirm-box p{font-size:12px;color:#14532d;line-height:1.6;margin-bottom:10px}
.msg-modele{background:white;border:1.5px solid #86efac;border-radius:10px;padding:12px 14px;font-size:12px;color:#1a3317;font-style:italic;line-height:1.7;margin:8px 0}
.msg-modele strong{font-style:normal;color:#166534}
.copy-btn{font-size:11px;background:#166534;color:white;border:none;border-radius:8px;padding:6px 14px;cursor:pointer;font-weight:700;margin-top:6px}
.sig-actions{display:flex;gap:8px;margin-top:10px}
.sbtn{padding:9px 16px;border:1.5px solid #dde8d9;border-radius:9px;background:white;font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;font-size:12px;font-weight:600;cursor:pointer;color:#5a7a52;transition:all .15s}
.sbtn:hover{border-color:#1e4d1a;background:#eaf4e7}
.sig-status{margin-top:8px;font-size:12px;color:#7a9e74;text-align:center}
.sig-status.ok{color:#16a34a;font-weight:700}
.cb-row{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;background:#f5faf4;border-radius:12px;margin-bottom:10px;cursor:pointer}
.cb-row input{width:18px;height:18px;accent-color:#1e4d1a;flex-shrink:0;margin-top:1px;cursor:pointer}
.cb-lbl{font-size:12.5px;color:#1a3317;line-height:1.5}
.btn-main{width:100%;padding:16px;background:#1e4d1a;color:white;border:none;border-radius:14px;font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:background .15s;margin-top:6px}
.btn-main:hover{background:#2d6e27}
.btn-main:disabled{background:#b0c8aa;cursor:not-allowed}
.succes{text-align:center;padding:32px 20px}
.succes-icon{font-size:64px;margin-bottom:16px}
.succes h2{font-size:22px;font-weight:800;color:#1e4d1a;margin-bottom:8px}
.succes p{font-size:14px;color:#5a7a52;line-height:1.6;margin-bottom:16px}
.erreur{text-align:center;padding:48px 20px}
.erreur-icon{font-size:56px;margin-bottom:16px}
.erreur h2{font-size:20px;font-weight:700;color:#dc2626;margin-bottom:8px}
.erreur p{font-size:13px;color:#7a9e74;line-height:1.7}
</style>
</head>

function getParam(name) {
  var search = window.location.search || window.location.href.split('?')[1] || '';
  if (search.charAt(0) === '?') search = search.slice(1);
  var pairs = search.split('&');
  for (var i = 0; i < pairs.length; i++) {
    var pair = pairs[i].split('=');
    if (decodeURIComponent(pair[0]) === name) {
      return pair[1] ? decodeURIComponent(pair[1].replace(/\+/g,' ')) : '';
    }
  }
  return null;
}

  } catch(e) {
    try { c = JSON.parse(atob(dataParam)); } catch(e2) { c = null; }
  }
}

// Fallback: chercher par numéro dans localStorage

  var numParam = getParam('contrat');
  if (numParam) {
    try {
      var contrats = JSON.parse(localStorage.getItem('cnet-contrats') || '[]');
      c = contrats.find(function(x){ return x.num === numParam; }) || null;
    } catch(e) { c = null; }
  }
}

// ── CANVAS SIGNATURE ────────────────────────────────────────────────────────
var drawing = false, lastX = 0, lastY = 0;
var canvas, ctx, sigValidated = false, sigData = null;

function initCanvas() {
  canvas = document.getElementById('sigCanvas');
  if (!canvas) return;
  ctx = canvas.getContext('2d');
  setCtxStyle();

  function getPos(e) {
    var r = canvas.getBoundingClientRect();
    var sx = canvas.width/r.width, sy = canvas.height/r.height;
    if (e.touches) return {x:(e.touches[0].clientX-r.left)*sx, y:(e.touches[0].clientY-r.top)*sy};
    return {x:(e.clientX-r.left)*sx, y:(e.clientY-r.top)*sy};
  }
  function draw(e) {
    if (!drawing) return;
    var p = getPos(e);
    ctx.beginPath(); ctx.moveTo(lastX,lastY); ctx.lineTo(p.x,p.y); ctx.stroke();
    lastX=p.x; lastY=p.y;
    document.getElementById('sigZone').classList.add('drawing');
  }
  canvas.addEventListener('mousedown',function(e){drawing=true;var p=getPos(e);lastX=p.x;lastY=p.y;});
  canvas.addEventListener('mousemove',draw);
  canvas.addEventListener('mouseup',function(){drawing=false;});
  canvas.addEventListener('mouseleave',function(){drawing=false;});
  canvas.addEventListener('touchstart',function(e){e.preventDefault();drawing=true;var p=getPos(e);lastX=p.x;lastY=p.y;},{passive:false});
  canvas.addEventListener('touchmove',function(e){e.preventDefault();draw(e);},{passive:false});
  canvas.addEventListener('touchend',function(){drawing=false;},{passive:false});
}

function setCtxStyle() {
  ctx.strokeStyle='#1e4d1a'; ctx.lineWidth=2.5; ctx.lineCap='round'; ctx.lineJoin='round';
}

function resizeCanvas() {
  if (!canvas) return;
  var w = canvas.offsetWidth;
  if (w > 0 && canvas.width !== w) {
    var imgData = ctx ? ctx.getImageData(0,0,canvas.width,canvas.height) : null;
    canvas.width = w;
    canvas.height = 160;
    setCtxStyle();
  }
}

function clearSig() {
  if (!canvas) return;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  sigValidated=false; sigData=null;
  document.getElementById('sigStatus').textContent='Signez ci-dessus puis cliquez Valider.';
  document.getElementById('sigStatus').className='sig-status';
  document.getElementById('btnConfirm').disabled=true;
  document.getElementById('sigZone').classList.remove('drawing');
}

function validateSig() {
  if (!canvas) return;
  var blank = document.createElement('canvas');
  blank.width=canvas.width; blank.height=canvas.height;
  if (canvas.toDataURL()===blank.toDataURL()) { alert('Veuillez signer avant de valider.'); return; }
  sigValidated=true;
  sigData=canvas.toDataURL('image/png');
  document.getElementById('sigStatus').textContent='✅ Signature validee — '+new Date().toLocaleString('fr-CA');
  document.getElementById('sigStatus').className='sig-status ok';
  document.getElementById('btnConfirm').disabled=false;
}

    {t:'3. Prix et paiement',x:'Le montant est fixe tel qu indique. Les taxes (TPS 5% et TVQ 9.975%) s ajoutent. Tout solde impaye apres 30 jours entraine des frais de 2% par mois. Frais de 45 $ pour tout cheque retourne.'},
    {t:'4. Annulation et resiliation',x:'Toute annulation doit etre transmise par ecrit avec un preavis de 30 jours. Des frais de 15% peuvent s appliquer. En cours de saison, le client est redevable des services deja rendus.'},
    {t:'5. Responsabilites et assurances',x:'Entretien C-Net detient une assurance responsabilite civile. Le client doit signaler tout obstacle, cable ou danger avant les travaux. Entretien C-Net ne peut etre responsable des elements non signales.'},
    {t:'6. Renouvellement du contrat',x:'Sauf avis contraire ecrit 30 jours avant l echeance, ce contrat est reconduit automatiquement aux memes conditions. Pour les contrats 2 ou 3 ans, le prix est garanti sans augmentation.'},
    {t:'7. Conditions meteorologiques',x:'Les services peuvent etre reportes sans penalite en cas de conditions rendant les travaux impossibles. Entretien C-Net s engage a effectuer les travaux reportes dans les meilleurs delais.'},
    {t:'8. Acces aux proprietes',x:'Le client assure un acces libre et securitaire aux zones de travail. Tout animal doit etre tenu a l ecart. Un acces bloque sera considere comme une visite effectuee et facture.'},
  ];
  clauses.forEach(function(cl,idx){
    var lines=doc.splitTextToSize(cl.x,CW-10);
    var bH=6+lines.length*4.5+5;
    doc.setFillColor(idx%2===0?247:242,idx%2===0?252:249,idx%2===0?245:240);
    doc.rect(M,y,CW,bH,'F');
    doc.setFillColor(30,77,26); doc.rect(M,y,2.5,bH,'F');
    doc.setFont('helvetica','bold'); doc.setTextColor(30,77,26); doc.setFontSize(8);
    doc.text(cl.t,M+6,y+5.5);
    doc.setFont('helvetica','normal'); doc.setTextColor(50,80,45); doc.setFontSize(7.5);
    doc.text(lines,M+6,y+11);
    y+=bH+3;
  });
  // Note signature bas de page 2
  doc.setFillColor(240,247,238); doc.rect(M,y,CW,8,'F');
  doc.setFont('helvetica','italic'); doc.setTextColor(60,100,55); doc.setFontSize(7);
  doc.text('Signature electronique realisee le '+fmtD(today)+' par '+c.nom+'.',M+3,y+5.5);
  ftr();

  doc.save('contrat-signe-cnet-'+(c.nom||'client').replace(/\s+/g,'-')+'-'+(c.num||'')+'.pdf');

  // ── CONFIRMATION AUTOMATIQUE dans localStorage ────────────────────────────
  // Met à jour cnet-contrats et cnet-clients immédiatement après la signature
  (function confirmerAuto() {
    try {
      var today = new Date().toISOString().split('T')[0];
      var tps = Math.round((c.montant||0)*0.05*100)/100;
      var tvq = Math.round((c.montant||0)*0.09975*100)/100;
      var tot = Math.round(((c.montant||0)+tps+tvq)*100)/100;
      var v1 = Math.round(tot/3*100)/100;
      var v2 = v1;
      var v3 = Math.round((tot-v1-v2)*100)/100;
      var ANNEE = new Date().getFullYear();

      // 1. Mettre à jour cnet-contrats
      var contrats = [];
      try { contrats = JSON.parse(localStorage.getItem('cnet-contrats') || '[]'); } catch(e) {}
      var ic = contrats.findIndex(function(x){ return x.num === c.num; });
      var contratObj = {
        nom:c.nom, tel:c.tel||'', email:c.email||'', adresse:c.adresse||'',
        type:c.type||'residentiel', montant:c.montant||0,
        services:c.services||[], date:c.date||today,
        signe:true, dateSig:today,
        num:c.num||('CTR-'+Date.now().toString().slice(-5)),
        modePaiement:c.modePaiement||'interac',
        modalitePaiement:c.modalitePaiement||'3v',
        paiementComplet:false, acompte:c.acompte||0,
        duree:c.duree||1, debut:c.debut||'', fin:c.fin||'',
        notes:c.notes||''
      };
      if (c.modalitePaiement === '1v') {
        contratObj.paiementUnique = { montant:tot, recu:false, date:today };
        contratObj.versements = [];
      } else {
        contratObj.versements = [
          {num:1, label:'1er versement', date:ANNEE+'-05-01', montant:v1, recu:false},
          {num:2, label:'2e versement',  date:ANNEE+'-07-01', montant:v2, recu:false},
          {num:3, label:'3e versement',  date:ANNEE+'-09-01', montant:v3, recu:false}
        ];
      }
      if (ic !== -1) {
        Object.assign(contrats[ic], contratObj);
      } else {
        contrats.push(contratObj);
      }
      localStorage.setItem('cnet-contrats', JSON.stringify(contrats));

      // 2. Mettre à jour cnet-clients
      var clients = [];
      try { clients = JSON.parse(localStorage.getItem('cnet-clients') || '[]'); } catch(e) {}
      var nomN = (c.nom||'').toLowerCase().trim();
      var telN = (c.tel||'').replace(/\D/g,'');
      var iCl = clients.findIndex(function(cl){
        return (cl.nom && cl.nom.toLowerCase().trim() === nomN) ||
               (telN && cl.tel && cl.tel.replace(/\D/g,'') === telN);
      });
      var svcNoms = (c.services||[]).map(function(s){
        return typeof s === 'object' ? (s.nom||s.name||'Service') : s;
      });
      var clientObj = {
        nom:c.nom, tel:c.tel||'', email:c.email||'', adresse:c.adresse||'',
        type:c.type||'residentiel', montant:c.montant||0,
        services:svcNoms, contrat:c.duree||1,
        contratNum:c.num||'', date:c.date||today,
        statut:'acceptee', dateSig:today,
        modePaiement:c.modePaiement||'interac',
        modalitePaiement:c.modalitePaiement||'3v',
        notes:c.notes||''
      };
      if (iCl !== -1) {
        Object.assign(clients[iCl], clientObj);
      } else {
        clients.push(clientObj);
      }
      localStorage.setItem('cnet-clients', JSON.stringify(clients));

    } catch(e) {
      console.warn('confirmerAuto:', e);
    }
  })();

  // Envoyer courriel de notification automatiquement
  setTimeout(function() { envoyerConfirmation(); }, 1200);

  // ── ÉCRAN DE SUCCÈS ──────────────────────────────────────────────────────
  setTimeout(function() {
    var tps2 = Math.round((c.montant||0)*0.05*100)/100;
    var tvq2 = Math.round((c.montant||0)*0.09975*100)/100;
    var tot2 = Math.round(((c.montant||0)+tps2+tvq2)*100)/100;
    var modeLabel = c.modePaiement==='interac' ? 'Virement Interac' : 'Chèque postdaté';
    var modalLabel = (c.modalitePaiement==='1v') ? '1 versement unique de '+fmt2(tot2)+' $' : '3 versements de '+fmt2(Math.round(tot2/3*100)/100)+' $';

    var today2 = new Date().toLocaleDateString('fr-CA',{year:'numeric',month:'long',day:'numeric'});
    var s3 = document.getElementById('s3');
    s3.innerHTML =
      '<div class="succes">' +
        '<div class="succes-icon">✅</div>' +
        '<h2>Contrat signé avec succès !</h2>' +
        '<p>Merci <strong>' + c.nom + '</strong>, votre contrat <strong>' + (c.num||'') + '</strong> a été signé le ' + today2 + '.<br>Votre PDF a été téléchargé automatiquement.</p>' +
        '<div style="background:#f0fdf4;border:2px solid #1e4d1a;border-radius:14px;padding:18px 20px;margin:16px 0;text-align:left">' +
          '<div style="font-size:12px;font-weight:700;color:#1e4d1a;margin-bottom:10px;text-transform:uppercase;letter-spacing:.05em">Récapitulatif</div>' +
          '<div style="display:grid;gap:6px">' +
            '<div style="display:flex;justify-content:space-between;font-size:13px"><span style="color:#5a7a52">Mode de paiement</span><strong>' + modeLabel + '</strong></div>' +
            '<div style="display:flex;justify-content:space-between;font-size:13px"><span style="color:#5a7a52">Versements</span><strong>' + modalLabel + '</strong></div>' +
            '<div style="display:flex;justify-content:space-between;font-size:13px"><span style="color:#5a7a52">Total (taxes incl.)</span><strong style="color:#1e4d1a;font-size:16px">' + fmt2(tot2) + ' $</strong></div>' +
          '</div>' +
        '</div>' +
        '<div style="background:#dcfce7;border:1px solid #86efac;border-radius:10px;padding:14px 16px;margin-bottom:16px;font-size:13px;color:#166534;font-weight:600">' +
          '✅ Entretien C-Net a été notifié automatiquement. Vous n\'avez rien d\'autre à faire !' +
        '</div>' +
        '<p style="font-size:11px;color:#a0b89a;margin-top:8px">Entretien C-Net · 418 440-6303 · entretiencnet.com</p>' +
      '</div>';
  }, 500);
}
// ── UTILITAIRES ─────────────────────────────────────────────────────────────
function fmt2(n){ return parseFloat(n||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,'\u00a0'); }
function fmtD(d){
  if(!d)return '-';
  var p=d.split('-');
  var mo=['janv','fevr','mars','avr','mai','juin','juil','aout','sept','oct','nov','dec'];
  return parseInt(p[2])+' '+mo[parseInt(p[1])-1]+' '+p[0];
}

function envoyerConfirmation() {
  // Envoyer courriel de notification simple — sans lien local
  var today = new Date().toISOString().split('T')[0];
  var tps = Math.round((c.montant||0)*0.05*100)/100;
  var tvq = Math.round((c.montant||0)*0.09975*100)/100;
  var tot = Math.round(((c.montant||0)+tps+tvq)*100)/100;
  var modeLabel = c.modePaiement==='interac' ? 'Virement Interac' : 'Chèque postdaté';
  var modalLabel = (c.modalitePaiement==='1v') ? '1 versement unique' : '3 versements';
  var dateStr = new Date().toLocaleDateString('fr-CA',{year:'numeric',month:'long',day:'numeric'});

  // Construire le lien de confirmation magique
  var confirmData = {
    num: c.num||'',
    nom: c.nom||'',
    tel: c.tel||'',
    email: c.email||'',
    adresse: c.adresse||'',
    montant: c.montant||0,
    dateSig: today,
    modePaiement: c.modePaiement||'interac',
    modalitePaiement: c.modalitePaiement||'3v',
    contratNum: c.num||''
  };
  var confirmEncode = btoa(unescape(encodeURIComponent(JSON.stringify(confirmData))));
  // Lien magique — détecte dynamiquement le chemin de suivi-clients-cnet.html
  var baseUrl = window.location.href.replace(/signature-cnet\.html.*$/, 'suivi-clients-cnet.html');
  var lienConfirm = baseUrl + '?confirmsig=' + confirmEncode;

  var sujet = '✅ Contrat signé — ' + (c.num||'') + ' — ' + (c.nom||'');
  var corps =
    'Bonjour Jeff & Dereck,\n\n' +
    '✅ ' + (c.nom||'') + ' a signé le contrat ' + (c.num||'') + ' le ' + dateStr + '.\n\n' +
    '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n' +
    'DÉTAILS DU CONTRAT :\n' +
    '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n' +
    '• Contrat : ' + (c.num||'') + '\n' +
    '• Client : ' + (c.nom||'') + '\n' +
    '• Mode de paiement : ' + modeLabel + '\n' +
    '• Versements : ' + modalLabel + '\n' +
    '• Total (taxes incluses) : ' + fmt2(tot) + ' $\n\n' +
    '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n' +
    'ACTION REQUISE — CONFIRMER DANS VOTRE SYSTÈME :\n' +
    '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n' +
    'Copiez ce lien et collez-le dans votre navigateur\n' +
    'pour confirmer la signature dans le suivi clients :\n\n' +
    lienConfirm + '\n\n' +
    '(Ouvrez ce fichier sur votre ordinateur, puis collez\n' +
    'le lien ci-dessus dans la barre d\'adresse du navigateur)\n\n' +
    '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n' +
    'Le PDF du contrat signé a été téléchargé par le client.\n\n' +
    'Cordialement,\n' + (c.nom||'Le client');

  window.location.href = 'mailto:tremblaymrs@gmail.com' +
    '?subject=' + encodeURIComponent(sujet) +
    '&body=' + encodeURIComponent(corps);
}
